<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<body>

<!-- ================= HEADER ================= -->
<header class="header">

    <nav id="nav-menu">
      <ul>
        <li><a href="index.html">Home</a></li>

      <div id="menu-toggle"><i class="fas fa-bars"></i></div>
    </div>

  </div>
</header>

<!-- ================= PAGE TITLE ================= -->
<section class="section">
  <div class="container center">
    <h2 class="section-title">Our Gallery</h2>
    <p>Moments from our worship, fellowship and activities</p>
  </div>
</section>

<!-- ================= GALLERY ================= -->
<section class="section light">
  <div class="container">

    <div class="gallery-grid">

      <img src="first.jpeg" alt="Church Event">
      <img src="cimage22.jpeg" alt="Worship">
      <img src="main3.jpg" alt="Sunday Worship">
      <img src="ss2.jpg" alt="Sunday School">
      <img src="sports.JPG" alt="Sports Event">
      <img src="sundayschool.jpeg" alt="Kids Activity">
      <img src="cimage3.jpeg" alt="Elders">
      <img src="preachers.jpg" alt="Preachers">
      <img src="church.png" alt="Church Building">

    </div>

  </div>
</section>

<!-- ================= LIGHTBOX ================= -->
<div class="lightbox" id="lightbox">
  <span class="close">&times;</span>
  <img id="lightbox-img">
</div>

<!-- ================= FOOTER ================= -->
<footer class="footer">
  <div class="container">
    <h3>Church of Christ Anandapuram</h3>

    <div class="socials">
      <a href="tel:+918951271344"><i class="fas fa-phone"></i></a>

    </div>

    <p>© 2026 All Rights Reserved</p>
  </div>
</footer>

<script src="script.js"></script>

<!-- ================= GALLERY SCRIPT ================= -->
<script>

// Lightbox functionality
const images = document.querySelectorAll(".gallery-grid img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const closeBtn = document.querySelector(".close");

images.forEach(img => {
  img.addEventListener("click", () => {
    lightbox.style.display = "flex";
    lightboxImg.src = img.src;
  });
});

closeBtn.addEventListener("click", () => {
  lightbox.style.display = "none";
});

lightbox.addEventListener("click", (e) => {
  if (e.target !== lightboxImg) {
    lightbox.style.display = "none";
  }
});

</script>

</body>
</html>
